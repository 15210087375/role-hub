# 时间线查询指南
query_guide:
  time_calculation: "python ../../tools/timeline-calc.py [起始时间] [结束时间]"
  event_search: "在文件中搜索 [时间] 或 [事件关键词]"
  location_timeline: "查看地点发展记录/[地点名称].md"

# 时间一致性检查
consistency_checks:
  character_locations:
    - check: "角色在同一时间不能出现在两个地方"
      method: "对比角色时间线记录"
      
  event_sequence:
    - check: "事件发生顺序要合理"
      method: "检查时间先后顺序"
      
  aging_consistency:
    - check: "角色年龄随时间增长"
      method: "计算时间跨度与年龄变化"
      
  seasonal_consistency:
    - check: "季节描写与时间匹配"
      method: "检查事件时间与季节描述"

