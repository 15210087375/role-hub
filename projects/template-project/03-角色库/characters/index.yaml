# 查询指南
query_guide:
  quick_commands:
    - command: "python ../../tools/character-query.py [角色名]"
      description: "查询角色基本信息"
      
    - command: "python ../../tools/character-query.py [角色名] --timeline"
      description: "查询角色时间线"
      
    - command: "python ../../tools/character-query.py [角色名] --relations"
      description: "查询角色关系"

  file_locations:
    detailed_profiles: "characters/[角色ID].md"
    relationship_diagram: "角色关系图.md"
    change_records: "../../08-协作记录/主笔变化记录/"

# 维护规范
maintenance_spec:
  update_frequency:
    p0: "每章更新状态变化"
    p1: "每卷更新状态变化"
    p2: "重要变化时更新"
    p3: "一般不更新，特殊情况记录"

  update_content:
    - "状态变化: 所在地、伤势、情绪等"
    - "能力变化: 等级提升、新技能、装备变化"
    - "关系变化: 新关系建立、旧关系变化"
    - "剧情进展: 参与的重要事件"

  update_workflow: |
    主笔记录变化 → 提交变化记录
          ↓
    责编检查确认 → 标记已验证
          ↓
    架构师整合更新 → 更新正式档案

# 统计信息
statistics:
  total_characters: "[数量]"
  active_characters: "[数量]"
  deceased_characters: "[数量]"
  last_statistics_time: "[日期]"

# 元数据
metadata:
  last_updated: "[YYYY-MM-DD]"
  updated_by: "[姓名]"
  version: "[版本号]"