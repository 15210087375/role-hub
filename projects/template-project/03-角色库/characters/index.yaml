# 角色库索引

# 索引说明
# 本文件为角色库的快速索引
# 按角色重要性分级管理
# 便于快速查询和统计

# 角色分级
p0_core_characters:  # 核心角色（必须维护）
  - id: "char-001"
    name: "[主角姓名]"
    role: "主角，剧情推动者"
    status: "[状态]"
    last_updated: "[日期]"
    owner: "[架构师]"
    
